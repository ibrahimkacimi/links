<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محل الحاج عيسى للألبسة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Light Green & Soft Cream Blend */
            background-color: #f8faf8;
            background: radial-gradient(circle at top left, #dcfce7 0%, #f8faf8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Decorative organic blobs for the light theme */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #bbf7d0;
            filter: blur(80px);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 100%; /* Allow it to use full screen width */
            padding: 10px;
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-img-circle {
            width: 70vw; 
            height: 70vw;
            margin: -60px auto 30px; /* Changed margin-top to -60px to move it up */
            border-radius: 100%;
            border: none; 
            background-color: transparent;
            background-image: url('ibrahim.jpg');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            
            /* Combined White Glow and Subtle Black Shadow */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9)) 
                    drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3));
        }

        .shop-title {
            color: #166534;
            font-size: 28px;
            margin-bottom: 80px; /* Increased margin to push icons back down */
            font-weight: 800;
        }


        .social-container {
            display: flex;
            justify-content: center; /* Center them instead of space-between */
            gap: 20px; /* Adjust this number to make them closer or further */
            align-items: center;
            width: 100%;
        }

        .link-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .icon-round {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background-color: #ffffff;
            /* Silver-grey stroke that fits the soft green theme */
            border: 4px solid #cbd5e1; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            
            /* ADDED ANIMATION */
            animation: floating 3s ease-in-out infinite;
        }

        .icon-round:active {
            transform: scale(0.9);
            border-color: #94a3b8;
        }

        /* ADDED KEYFRAMES FOR MOVEMENT */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* DELAYS TO MAKE THEM MOVE AT DIFFERENT TIMES */
        .wa .icon-round { animation-delay: 0.2s; }
        .tk .icon-round { animation-delay: 0.4s; }

        /* Original Brand Colors for Icons */
        .fb i { color: #1877F2; }
        .wa i { color: #25D366; }
        .tk i { color: #000000; }

        .icon-label {
            margin-top: 15px;
            font-size: 14px;
            color: #166534;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="main-img-circle"></div>

        <h1 class="shop-title">محل الحاج عيسى للألبسة</h1>

        <div class="social-container">
            <a href="https://www.facebook.com/share/1LJD1tSsXu/" class="link-unit fb">
                <div class="icon-round"><i class="fab fa-facebook-f"></i></div>
                <span class="icon-label">فيسبوك</span>
            </a>

            <a href="https://wa.me/213666074846" class="link-unit wa">
                <div class="icon-round"><i class="fab fa-whatsapp"></i></div>
                <span class="icon-label">واتساب</span>
            </a>

            <a href="https://www.tiktok.com/@kacemiibrahim?_r=1&_t=ZS-965CRDFY8f7" class="link-unit tk">
                <div class="icon-round"><i class="fab fa-tiktok"></i></div>
                <span class="icon-label">تيك توك</span>
            </a>
        </div>
    </div>

</body>
</html>
